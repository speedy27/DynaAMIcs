# Tahoe perturbation world model: frozen MosaicFM encoder + drug-conditioned predictor.
meta:
  seed: 0

data:
  cache_path: artifacts/tahoe/cache_pert.pt
  val_fraction: 0.2
  batch_size: 1024
  num_workers: 8

loss:
  sig_coeff: 1.0       # PerturbationSignatureLoss (drug-signature consistency) -- biology
  path_coeff: 1.0      # PathwayCoherenceLoss (program structure)               -- biology
  cos_coeff: 1.0       # JEPA-DNA latent cosine alignment (set 0.0 for MSE-only baseline ablation)
  ot_coeff: 0.5        # eb_jepa sliced-Wasserstein OT: match predicted vs true perturbed
                       # DISTRIBUTION per (drug, cell_line) stratum (0.0 = off, pure pairwise)
  ot_slices: 256       # random directions for the sliced-Wasserstein estimate

model:
  layers: 1            # predictor (GRU) depth -- JEPA-DNA: predictor depth is the key knob
  encoder: identity    # "identity" = frozen MosaicFM embeddings (E1) | "settransformer" = E3 (2-step)
  ground_ckpt: ""      # path to tahoe_ground.pt (required when encoder=settransformer); raw-gene cache

optim:
  epochs: 30
  lr: 1.0e-3
  weight_decay: 1.0e-4
  probe_every: 3

logging:
  log_wandb: false
