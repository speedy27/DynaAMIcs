# Layer A — static community set-JEPA via two-view VICReg/BCS on OTU communities.
# This is the SAFE layer: it must always train without collapse and yield a probe-able encoder.
# Smoke locally on CPU (fire override syntax is `--key value`, NOT bare key=value):
#   .venv-cpu/bin/python -m examples.microbiome_jepa.main \
#     --fname examples/microbiome_jepa/cfgs/layerA_vicreg.yaml \
#     --optim.epochs 2 --data.size 256 --data.batch_size 32
# VERIFIED GREEN 2026-06-19 (CPU, synthetic): loss 1.41->1.29, feat_std~0.91 stable (no collapse).

meta:
  seed: 42
  device: auto          # auto | cuda | cpu

data:
  env_name: microbiome
  source: synthetic     # synthetic (CPU smoke, no data needed) | real
  mode: two_view        # two_view (VICReg/BCS) | masked (I-JEPA, later)
  data_dir:             # real-data root; on cluster: $EBJEPA_DSETS/susagi/data . null -> synthetic
  embeddings_h5:        # e.g. <data_dir>/model/prokbert_embeddings.h5
  corpus:               # e.g. <data_dir>/microbeatlas/samples-otus.97.mapped (real pretraining)
  n_max: 256            # max OTUs per community (padded to this)
  emb_dim: 384          # ProkBERT embedding dim
  batch_size: 64
  num_workers: 4
  size: 4096            # samples per epoch (synthetic source)
  # two-view augmentation knobs (consumed by WS1 transforms.augment_community)
  subsample_frac: 0.8
  jitter_std: 0.1
  dropout_p: 0.1

model:
  token_dim: 385        # emb_dim + 1 (z-scored CLR log-abundance)
  d_model: 256          # encoder output dim D (== probe feature dim; == predictor hidden for Layer B)
  n_heads: 4
  n_layers: 4
  dim_feedforward: 512
  dropout: 0.0
  pool: mean            # masked permutation-invariant pool
  use_projector: true   # projector spec is derived from d_model in main.py

loss:
  type: vicreg          # vicreg | bcs (sigreg)
  std_coeff: 1.0
  cov_coeff: 25.0       # watch collapse: if var_loss climbs while it dominates, raise this / fix proj
  lmbd: 10.0            # bcs only

optim:
  epochs: 100
  lr: 0.001
  weight_decay: 1.0e-5
  warmup_ratio: 0.1

logging:
  log_wandb: false
  log_every: 1
  save_every_n_epochs: 25
  tqdm_silent: false

training:
  use_amp: false        # CPU smoke: off. On GPU set true + dtype bfloat16.
  dtype: bfloat16
